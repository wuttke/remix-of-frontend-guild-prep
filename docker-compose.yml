version: '3.8'

services:
  # TanStack Start SSR Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocket-dev-guild-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add any other environment variables needed
      # - VITE_USE_MOCK_DATA=false
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    # Uncomment if you need to connect to a backend service
    # depends_on:
    #   - backend

  # Optional: nginx reverse proxy to combine frontend and backend
  # nginx:
  #   image: nginx:alpine
  #   container_name: pocket-dev-guild-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
