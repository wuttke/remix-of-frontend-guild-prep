version: '3.8'

services:
  # TanStack Start SSR Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time (import.meta.env.VITE_*).
        # Must be "false" so the app calls the real backend at /api instead of
        # using in-memory mock data.
        VITE_USE_MOCK_DATA: "false"
    container_name: pocket-dev-guild-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # nginx reverse proxy: serves the SSR frontend and proxies /api to the
  # host-side uvicorn (run manually, not in compose).
  nginx:
    image: nginx:alpine
    container_name: pocket-dev-guild-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      # Lets nginx reach the host (where uvicorn runs) as host.docker.internal.
      # Requires the host uvicorn to listen on 0.0.0.0:8000 (NOT 127.0.0.1).
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
